    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #f5f0eb;
      --red: #8b1a1a;
      --muted: #6b6b6b;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2.5rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    nav a:hover {
      color: var(--white);
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(139, 26, 26, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      max-width: 900px;
    }

    .tagline em {
      font-style: italic;
      color: var(--red);
    }

    .sub {
      margin-top: 2rem;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .cta {
      margin-top: 3.5rem;
      display: inline-block;
      padding: 0.85rem 2.5rem;
      border: 1px solid rgba(245, 240, 235, 0.25);
      color: var(--white);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: border-color 0.3s, background 0.3s;
    }

    .cta:hover {
      border-color: var(--white);
      background: rgba(245, 240, 235, 0.05);
    }

    /* About */
    .about {
      max-width: 680px;
      margin: 0 auto 6rem;
      padding: 0 2rem;
      text-align: center;
    }

    .about h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      color: var(--white);
    }

    .about p {
      font-size: 0.95rem;
      line-height: 1.9;
      color: #a8a09a;
      font-weight: 300;
    }

    .about p + p {
      margin-top: 1.25rem;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--red), transparent);
      margin: 0 auto 4rem;
    }

    /* Footer */
    footer {
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    footer p {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      transition: color 0.3s;
    }

    footer a:hover {
      color: var(--white);
    }

    @media (max-width: 600px) {
      nav { padding: 1.5rem; }
      nav ul { gap: 1.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
